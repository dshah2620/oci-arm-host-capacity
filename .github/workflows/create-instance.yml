name: OCI ARM Instance Creator

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  create-instance:
    runs-on: ubuntu-latest
    steps:
      - name: Setup OCI CLI
        env:
          OCI_USER_OCID: ${{ secrets.OCI_USER_OCID }}
          OCI_KEY_FINGERPRINT: ${{ secrets.OCI_KEY_FINGERPRINT }}
          OCI_TENANCY_OCID: ${{ secrets.OCI_TENANCY_OCID }}
          OCI_PRIVATE_KEY: ${{ secrets.OCI_PRIVATE_KEY }}
          OCI_REGION: ${{ secrets.OCI_REGION }}
        run: |
          pip install oci-cli --quiet
          mkdir -p ~/.oci
          printf '%s' "$OCI_PRIVATE_KEY" > ~/.oci/key.pem
          chmod 600 ~/.oci/key.pem
          {
            echo "[DEFAULT]"
            echo "user=$OCI_USER_OCID"
            echo "fingerprint=$OCI_KEY_FINGERPRINT"
            echo "tenancy=$OCI_TENANCY_OCID"
            echo "region=$OCI_REGION"
            echo "key_file=/home/runner/.oci/key.pem"
          } > ~/.oci/config
          chmod 600 ~/.oci/config

      - name: Try to create ARM instance
        env:
          OCI_AVAILABILITY_DOMAIN: ${{ secrets.OCI_AVAILABILITY_DOMAIN }}
          OCI_COMPARTMENT_ID: ${{ secrets.OCI_COMPARTMENT_ID }}
          OCI_SUBNET_ID: ${{ secrets.OCI_SUBNET_ID }}
          OCI_IMAGE_ID: ${{ secrets.OCI_IMAGE_ID }}
          OCI_SSH_PUBLIC_KEY: ${{ secrets.OCI_SSH_PUBLIC_KEY }}
        run: |
          printf '%s' "$OCI_SSH_PUBLIC_KEY" > /tmp/ssh_key.pub

          result=$(oci compute instance launch \
            --availability-domain "$OCI_AVAILABILITY_DOMAIN" \
            --compartment-id "$OCI_COMPARTMENT_ID" \
            --shape "VM.Standard.A1.Flex" \
            --shape-config '{"ocpus":4,"memoryInGBs":24}' \
            --source-details "{\"sourceType\":\"image\",\"imageId\":\"$OCI_IMAGE_ID\",\"bootVolumeSizeInGBs\":50}" \
            --subnet-id "$OCI_SUBNET_ID" \
            --assign-public-ip true \
            --display-name "invoiceprocessor" \
            --ssh-authorized-keys-file /tmp/ssh_key.pub \
            2>&1) || true

          if echo "$result" | grep -qi "out of capacity\|InternalError"; then
            echo "No capacity yet. Will retry in 10 minutes."
            exit 0
          elif echo "$result" | grep -q '"id"'; then
            echo "SUCCESS! Instance created."
            echo "$result" | python3 -c "import sys,json; d=json.load(sys.stdin); print('Instance ID:', d['data']['id'])"
            exit 0
          else
            echo "Result: $result"
            exit 1
          fi
