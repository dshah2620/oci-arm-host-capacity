name: OCI ARM Instance Creator

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  create-instance:
    runs-on: ubuntu-latest
    steps:
      - name: Install OCI Python SDK
        run: pip install oci --quiet

      - name: Try to create ARM instance
        env:
          OCI_USER_OCID: ${{ secrets.OCI_USER_OCID }}
          OCI_KEY_FINGERPRINT: ${{ secrets.OCI_KEY_FINGERPRINT }}
          OCI_TENANCY_OCID: ${{ secrets.OCI_TENANCY_OCID }}
          OCI_PRIVATE_KEY: ${{ secrets.OCI_PRIVATE_KEY }}
          OCI_REGION: ${{ secrets.OCI_REGION }}
          OCI_SUBNET_ID: ${{ secrets.OCI_SUBNET_ID }}
          OCI_IMAGE_ID: ${{ secrets.OCI_IMAGE_ID }}
          OCI_AVAILABILITY_DOMAIN: ${{ secrets.OCI_AVAILABILITY_DOMAIN }}
          OCI_COMPARTMENT_ID: ${{ secrets.OCI_COMPARTMENT_ID }}
          OCI_SSH_PUBLIC_KEY: ${{ secrets.OCI_SSH_PUBLIC_KEY }}
        run: |
          python3 << 'PYEOF'
          import oci, os, sys

          config = {
              "user": os.environ["OCI_USER_OCID"],
              "key_content": os.environ["OCI_PRIVATE_KEY"],
              "fingerprint": os.environ["OCI_KEY_FINGERPRINT"],
              "tenancy": os.environ["OCI_TENANCY_OCID"],
              "region": os.environ["OCI_REGION"],
          }

          compute = oci.core.ComputeClient(config)

          instances = compute.list_instances(
              compartment_id=os.environ["OCI_COMPARTMENT_ID"],
              display_name="invoiceprocessor"
          ).data

          running = [i for i in instances if i.lifecycle_state not in ("TERMINATED", "TERMINATING")]
          if running:
              print(f"Instance already exists: {running[0].id} ({running[0].lifecycle_state})")
              sys.exit(0)

          try:
              r = compute.launch_instance(oci.core.models.LaunchInstanceDetails(
                  availability_domain=os.environ["OCI_AVAILABILITY_DOMAIN"],
                  compartment_id=os.environ["OCI_COMPARTMENT_ID"],
                  shape="VM.Standard.A1.Flex",
                  shape_config=oci.core.models.LaunchInstanceShapeConfigDetails(ocpus=4, memory_in_gbs=24),
                  source_details=oci.core.models.InstanceSourceViaImageDetails(
                      source_type="image",
                      image_id=os.environ["OCI_IMAGE_ID"],
                      boot_volume_size_in_gbs=50
                  ),
                  create_vnic_details=oci.core.models.CreateVnicDetails(
                      assign_public_ip=True,
                      subnet_id=os.environ["OCI_SUBNET_ID"]
                  ),
                  display_name="invoiceprocessor",
                  metadata={"ssh_authorized_keys": os.environ["OCI_SSH_PUBLIC_KEY"]}
              ))
              print(f"SUCCESS! Instance created: {r.data.id}")
              print("Go to Oracle Cloud console to get your public IP address.")
              sys.exit(0)
          except oci.exceptions.ServiceError as e:
              if "Out of capacity" in str(e.message):
                  print(f"No capacity yet. Will retry in 10 minutes.")
                  sys.exit(0)
              else:
                  print(f"Error: {e}")
                  sys.exit(1)
          PYEOF
